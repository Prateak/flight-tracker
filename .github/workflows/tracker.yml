name: Flight Tracker

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:

  run-tracker:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: pip install requests

    - run: python tracker.py
      env:
        RAPIDAPI_KEY: 71071d9198msh758e4b81eb1efddp1c92e0jsnf13a8d59d120

    - name: Upload CSV
      uses: actions/upload-artifact@v4
      with:
        name: flight-prices
        path: prices.csv
